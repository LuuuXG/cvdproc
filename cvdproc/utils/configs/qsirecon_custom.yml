name: custom_dsi_pipeline
nodes:
-   action: reconstruction
    input: qsirecon
    name: dsistudio_gqi
    parameters:
        method: gqi
    qsirecon_suffix: DSIStudio
    software: DSI Studio
-   action: export
    input: dsistudio_gqi
    name: scalar_export
    qsirecon_suffix: DSIStudio
    software: DSI Studio
-   action: tractography
    input: dsistudio_gqi
    name: tractography
    parameters:
        fiber_count: 1000000
        initial_dir: 2
        interpolation: 0
        max_length: 250
        min_length: 30
        seed_plan: 0
        smoothing: 0.0
        step_size: 1.0
        turning_angle: 35
    software: DSI Studio
-   action: 3dSHORE_reconstruction
    input: qsirecon
    name: recon_3dshore
    parameters:
        big_delta: null
        lambdaL: 1.0e-08
        lambdaN: 1.0e-08
        radial_order: 6
        regularization: L2
        small_delta: null
        tau: 0.025330295910584444
        write_fibgz: true
        write_mif: true
        zeta: 700
    qsirecon_suffix: 3dSHORE
    software: Dipy
space: T1w
nodes:
-   action: MAPMRI_reconstruction
    input: qsirecon
    name: mapmri_recon
    parameters:
        anisotropic_scaling: false
        big_delta: null
        bval_threshold: 2000
        dti_scale_estimation: false
        laplacian_regularization: true
        laplacian_weighting: 0.2
        radial_order: 6
        small_delta: null
        write_fibgz: true
        write_mif: true
    qsirecon_suffix: DIPYMAPMRI
    software: Dipy
space: T1w